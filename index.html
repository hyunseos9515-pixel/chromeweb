<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>G-Momentum</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="bg-image"></div>

    <div id="weather" class="widget-box hidden">
      <span class="weather-icon"></span>
      <div class="weather-text">
        <span class="location"></span>
        <span class="temp"></span>
        <span class="desc"></span>
      </div>
    </div>

    <div id="login-container" class="central-widget">
      <h2 id="login-clock" class="clock big-clock">00:00:00</h2>
      <h3 id="login-date" class="date-text">0000년 00월 00일 요일</h3>

      <form id="login-form">
        <input
          required
          maxlength="15"
          type="text"
          placeholder="이름을 입력하세요"
        />
        <button type="submit">로그인</button>
      </form>
    </div>

    <div id="main-container" class="central-widget hidden">
      <button id="logout-btn" class="widget-box top-left-btn">로그아웃</button>

      <h2 id="main-clock" class="clock big-clock">00:00:00</h2>
      <h3 id="main-date" class="date-text">0000년 00월 00일 요일</h3>

      <h1 id="greeting"></h1>

      <div id="todo-section">
        <h3>할 일 목록</h3>
        <form id="todo-form">
          <input type="text" placeholder="새로운 할 일을 입력하세요" required />
          <button type="submit">추가</button>
        </form>
        <ul id="todo-list"></ul>
      </div>
    </div>

    <script src="g-app.js"></script>
    <script src="g-todo.js"></script>
  </body>
</html>
